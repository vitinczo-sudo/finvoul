version: '3.9'

# ══════════════════════════════════════════════
# FinVault — Stack de Produção
# Serviços: App · PostgreSQL · Redis · Nginx · Certbot
# Uso: docker-compose up -d
# ══════════════════════════════════════════════

services:

  # ──────────────────────────────────────────
  # API Node.js
  # ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: finvault_app
    restart: unless-stopped
    environment:
      NODE_ENV:          production
      PORT:              3001
      DATABASE_URL:      postgres://finvault_app:${DB_PASS}@postgres:5432/finvault
      REDIS_URL:         redis://:${REDIS_PASS}@redis:6379
      JWT_PRIVATE_KEY:   ${JWT_PRIVATE_KEY}
      JWT_PUBLIC_KEY:    ${JWT_PUBLIC_KEY}
      JWT_EXPIRES:       15m
      REFRESH_EXPIRES:   30d
      AES_KEY:           ${AES_KEY}
      GOOGLE_CLIENT_ID:  ${GOOGLE_CLIENT_ID}
      SENDGRID_API_KEY:  ${SENDGRID_API_KEY}
      APP_URL:           https://${DOMAIN}
      MAX_LOGIN_FAILS:   5
      LOCKOUT_MINUTES:   30
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  # ──────────────────────────────────────────
  # PostgreSQL 16
  # ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finvault_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       finvault
      POSTGRES_USER:     finvault_app
      POSTGRES_PASSWORD: ${DB_PASS}
      PGDATA:            /var/lib/postgresql/data/pgdata
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finvault_app -d finvault"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
    # Configurações de performance
    command: >
      postgres
        -c max_connections=100
        -c shared_buffers=256MB
        -c work_mem=4MB
        -c maintenance_work_mem=64MB
        -c effective_cache_size=768MB
        -c log_min_duration_statement=1000
        -c log_connections=on
        -c log_disconnections=on
        -c ssl=on
        -c ssl_cert_file=/etc/ssl/certs/ssl-cert-snakeoil.pem
        -c ssl_key_file=/etc/ssl/private/ssl-cert-snakeoil.key

  # ──────────────────────────────────────────
  # Redis 7 (sessões, cache, rate-limit)
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finvault_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS} --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ──────────────────────────────────────────
  # Nginx — reverse proxy + TLS termination
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: finvault_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────────────────────────────────────────
  # Certbot — Let's Encrypt TLS automático
  # ──────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: finvault_certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'
    depends_on:
      - nginx

  # ──────────────────────────────────────────
  # Backup automático — S3/R2 diário
  # ──────────────────────────────────────────
  backup:
    image: postgres:16-alpine
    container_name: finvault_backup
    restart: unless-stopped
    environment:
      PGPASSWORD:        ${DB_PASS}
      AWS_ACCESS_KEY_ID: ${BACKUP_S3_KEY}
      AWS_SECRET_ACCESS_KEY: ${BACKUP_S3_SECRET}
      S3_BUCKET:         ${BACKUP_S3_BUCKET}
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    command: >
      /bin/sh -c 'apk add --no-cache aws-cli curl &&
        while true; do
          sleep 86400 &&
          pg_dump -h postgres -U finvault_app finvault | gzip |
          aws s3 cp - s3://$$S3_BUCKET/finvault-$$(date +%Y%m%d).sql.gz
          --region sa-east-1 &&
          echo "Backup OK: $$(date)";
        done'

volumes:
  pg_data:
  redis_data:
  certbot_certs:
  certbot_www:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
